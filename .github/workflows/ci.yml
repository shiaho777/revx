# Delivery gate:
# - Branch protection should require this workflow's merge job on PRs into main.
# - Issues close via PR body Fixes #N / Closes #N on *merge*, not from this workflow.
# - Do not merge while this workflow is red; do not close the linked Issue early.
# Required check: job id `test` (often shown as "ci / test").
name: ci

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Install system sqlite
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev pkg-config
      - name: Delivery policy summary
        run: |
          {
            echo "## Delivery gate"
            echo "- This job (\`test\` / **ci / test**) is the merge gate for PRs into \`main\`."
            echo "- Issues close via PR body \`Fixes #N\` / \`Closes #N\` on **merge**, not from this workflow."
            echo "- Do not merge while this workflow is red; do not close the linked Issue early."
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Check core crates
        run: cargo check -p revx-core -p revx-analysis -p revx-loader -p revx-daemon -p revx-engine
      - name: Parity suite
        run: cargo test -p revx-analysis --test parity_suite --test corpus_smoke --test corpus_golden -- --nocapture
      - name: Optional corpus smoke
        if: ${{ env.REVX_CORPUS_DIR != '' }}
        run: cargo test -p revx-analysis --test corpus_smoke -- --nocapture
        env:
          REVX_CORPUS_DIR: ${{ vars.REVX_CORPUS_DIR }}
